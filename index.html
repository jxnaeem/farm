<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> গরু ড্যাশবোর্ড • গর্ভধারণ মনিটর</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap');

    :root {
      --primary: #10b981;
      --accent: #34d399;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans Bengali', sans-serif;
      background: linear-gradient(135deg, #0f766e 0%, #134e4a 100%);
      min-height: 100vh;
      padding: 15px 12px;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      padding: 20px 0;
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 1.15rem;
      opacity: 0.95;
    }

    .cows-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    @media (min-width: 768px) {
      .cows-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .cow-card {
      background: white;
      border-radius: 28px;
      padding: 26px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.18);
      transition: all 0.4s ease;
    }

    .cow-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.22);
    }

    .cow-name {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .name-main {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .age-text {
      font-size: 1.05rem;
      font-weight: 600;
      color: #10b981;
      background: #f0fdf4;
      padding: 6px 14px;
      border-radius: 30px;
      white-space: nowrap;
    }

    .pregnancy-time {
      font-size: 1.55rem;
      font-weight: 700;
      color: #059669;
      background: linear-gradient(90deg, #f0fdf4, #ecfdf5);
      padding: 16px 20px;
      border-radius: 20px;
      text-align: center;
      margin: 18px 0 16px;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.15);
      border: 2px solid #a7f3d0;
    }

    .delivery-date {
      text-align: center;
      font-size: 1.1rem;
      color: #475569;
      margin-bottom: 22px;
      font-weight: 500;
    }

    /* প্রগ্রেস বার - উন্নত সংস্করণ */
    .progress-container {
      height: 28px;
      background: #e2e8f0;        /* হালকা ধূসর ব্যাকগ্রাউন্ড */
      border-radius: 9999px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 1px solid #cbd5e1;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #34d399);
      transition: width 2s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-radius: 9999px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.5);
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #94a3b8;
      font-size: 1.3rem;
      background: white;
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🐄 খামার মনিটরিং ড্যাশবোর্ড</h1>

    </header>

    <div id="cowsGrid" class="cows-grid"></div>
  </div>

  <script>
    // ==================== এখানে ডাটা এডিট করুন ====================
    const cowsData = [
         {
        name: "রানী (বড় গরু)",
        birth: "2023-05-15",
        preg: "2025-09-01"
      },
            {
        name: "সুন্দরী (ছোট গরু)",
        birth: "2025-01-10",
        preg: "2026-04-25"
      },

    ];
    // =============================================================

    // বাংলা সংখ্যা কনভার্টার
    function toBengaliNumber(num) {
      const bengali = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
      return num.toString().split('').map(d => bengali[parseInt(d)]).join('');
    }

    function calculateAgeInBangla(birthDateStr) {
      if (!birthDateStr) return "তারিখ নেই";

      const today = new Date();
      const birth = new Date(birthDateStr);
      let totalDays = Math.floor((today - birth) / (1000 * 60 * 60 * 24));
      if (totalDays < 0) totalDays = 0;

      const years = Math.floor(totalDays / 365);
      let remainingDays = totalDays % 365;
      const months = Math.floor(remainingDays / 30);
      const days = remainingDays % 30;

      let result = '';
      if (years > 0) result += `${toBengaliNumber(years)} বছর `;
      if (months > 0) result += `${toBengaliNumber(months)} মাস `;
      if (days > 0 || (years === 0 && months === 0)) result += `${toBengaliNumber(days)} দিন`;

      return result.trim();
    }

    function calculatePregnancy(pregDateStr) {
      if (!pregDateStr) return { months: "০", days: "০", totalDays: 0, deliveryDate: "তারিখ নেই" };

      const today = new Date();
      const preg = new Date(pregDateStr);
      let totalDays = Math.floor((today - preg) / (1000 * 60 * 60 * 24));
      if (totalDays < 0) totalDays = 0;

      const months = Math.floor(totalDays / 30);
      const days = totalDays % 30;

      const delivery = new Date(preg);
      delivery.setDate(delivery.getDate() + 280);

      const deliveryFormatted = delivery.toLocaleDateString('bn-BD', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      return {
        months: toBengaliNumber(months),
        days: toBengaliNumber(days),
        totalDays,
        deliveryDate: deliveryFormatted
      };
    }

    function renderDashboard() {
      const grid = document.getElementById('cowsGrid');
      grid.innerHTML = '';

      if (cowsData.length === 0) {
        grid.innerHTML = `<div class="empty-state">কোনো গরুর তথ্য পাওয়া যায়নি</div>`;
        return;
      }

      cowsData.forEach(cow => {
        const ageBangla = calculateAgeInBangla(cow.birth);
        const preg = calculatePregnancy(cow.preg);
        const progress = Math.min(Math.round((preg.totalDays / 280) * 100), 100);

        const card = document.createElement('div');
        card.className = 'cow-card';
        card.innerHTML = `
          <div class="cow-name">
            <div class="name-main">
              🐄 ${cow.name}
              <span class="age-text">(${ageBangla})</span>
            </div>
          </div>

          <!-- গর্ভধারণ সময় -->
          <div class="pregnancy-time">
            গর্ভধারণ চলছে<br>
            <span style="font-size: 1.85rem; color: #059669;">${preg.months} মাস ${preg.days} দিন</span>
          </div>

          <div class="delivery-date">
            সম্ভাব্য ডেলিভারি: <strong>${preg.deliveryDate}</strong>
          </div>

          <!-- প্রগ্রেস বার (স্পষ্ট) -->
          <div class="progress-container">
            <div class="progress-bar" style="width: ${progress}%"></div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    window.onload = renderDashboard;
    setInterval(renderDashboard, 60000);
  </script>
</body>
</html>
