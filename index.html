<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>খামার ড্যাশবোর্ড • গরু ও ছাগল</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap');
   
    :root { --primary: #10b981; }
   
    * { margin: 0; padding: 0; box-sizing: border-box; }
   
    body {
      font-family: 'Noto Sans Bengali', sans-serif;
      background: linear-gradient(135deg, #0f766e 0%, #134e4a 100%);
      min-height: 100vh;
      padding: 15px 12px;
      color: #1f2937;
    }
   
    .container { max-width: 1200px; margin: 0 auto; }
   
    header {
      text-align: center;
      color: white;
      margin-bottom: 25px;
    }
   
    h1 { font-size: 2.3rem; font-weight: 700; }
   
    .summary {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }
   
    .summary-card {
      background: rgba(255,255,255,0.15);
      color: white;
      padding: 12px 20px;
      border-radius: 20px;
      text-align: center;
      min-width: 110px;
    }
   
    .animals-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }
   
    @media (min-width: 768px) {
      .animals-grid { grid-template-columns: repeat(2, 1fr); }
    }
   
    .animal-card {
      background: white;
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      transition: all 0.4s ease;
    }
   
    .animal-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.2);
    }
   
    .animal-image {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      margin: 0 auto 16px;
      border: 5px solid #f0fdf4;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.2);
    }
   
    .pregnancy-main {
      text-align: center;
      background: #f0fdf4;
      padding: 16px;
      border-radius: 20px;
      margin: 16px 0;
      border: 2px solid #a7f3d0;
    }
   
    .start-date {
      text-align: center;
      color: #475569;
      font-size: 1.05rem;
      margin-bottom: 10px;
    }
   
    .delivery-date {
      text-align: center;
      font-size: 1.05rem;
      color: #334155;
      margin: 12px 0;
      font-weight: 600;
    }
   
    .days-left {
      text-align: center;
      color: #10b981;
      font-weight: 700;
      margin: 8px 0;
      font-size: 1.1rem;
    }

    .not-pregnant {
      text-align: center;
      color: #64748b;
      font-size: 1.1rem;
      padding: 16px;
      background: #f8fafc;
      border-radius: 16px;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🐄🐐 খামার ড্যাশবোর্ড</h1>
      <p style="color:white; opacity:0.9;">গর্ভধারণ মনিটরিং</p>
    </header>
    <div class="summary" id="summary"></div>
    <div id="animalsGrid" class="animals-grid"></div>
  </div>

  <script>
    // ==================== এখানে ডাটা এডিট করুন ====================
    const animalsData = [
      {
        type: "cow",
        name: "রানী (বড় গরু)",
        birth: "2023-05-15",
        preg: "2025-09-01",
        health: "healthy",
        image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAZuVB4ahFi6JR9wMl1S-I8D2XCqDJ44yVfw&s"
      },
      {
        type: "cow",
        name: "সুন্দরী (ছোট গরু)",
        birth: "2025-01-10",
        preg: "2026-04-25",
        image: ""
      },
      {
        type: "goat",
        name: "বড় ছাগল",
        birth: "2023-01-10",
        preg: "",
        image: ""
      },
      {
        type: "goat",
        name: "বাচ্চা-১",
        birth: "2026-03-10",
        preg: "",
        image: ""
      },
      {
        type: "goat",
        name: "বাচ্চা-২",
        birth: "2026-03-10",
        preg: "",
        image: ""
      }
    ];
    // =============================================================

    function toBengaliNumber(num) {
      const bengali = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
      return num.toString().split('').map(d => bengali[parseInt(d)]).join('');
    }

    function calculateAge(birthDateStr) {
      const today = new Date();
      const birth = new Date(birthDateStr);
      let totalDays = Math.floor((today - birth) / 86400000);
      if (totalDays < 0) totalDays = 0;
      const years = Math.floor(totalDays / 365);
      let rem = totalDays % 365;
      const months = Math.floor(rem / 30);
      const days = rem % 30;
      let str = '';
      if (years) str += `${toBengaliNumber(years)} বছর `;
      if (months) str += `${toBengaliNumber(months)} মাস `;
      if (days || (!years && !months)) str += `${toBengaliNumber(days)} দিন`;
      return str.trim();
    }

    function calculatePregnancy(pregDateStr) {
      if (!pregDateStr || pregDateStr.trim() === "") {
        return { isPregnant: false };
      }

      const today = new Date();
      const preg = new Date(pregDateStr);
      let totalDays = Math.floor((today - preg) / 86400000);
      if (totalDays < 0) totalDays = 0;
      
      const months = Math.floor(totalDays / 30);
      const days = totalDays % 30;
      const daysLeft = Math.max(280 - totalDays, 0);

      const delivery = new Date(preg);
      delivery.setDate(delivery.getDate() + 280);

      return {
        isPregnant: true,
        months: toBengaliNumber(months),
        days: toBengaliNumber(days),
        daysLeft: toBengaliNumber(daysLeft),
        deliveryDate: delivery.toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' }),
        startDate: new Date(pregDateStr).toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' }),
        progress: Math.min(Math.round((totalDays / 280) * 100), 100)
      };
    }

    function renderSummary() {
      const total = animalsData.length;
      const cows = animalsData.filter(a => a.type === "cow").length;
      const goats = animalsData.filter(a => a.type === "goat").length;

      document.getElementById('summary').innerHTML = `
        <div class="summary-card"><strong>${toBengaliNumber(total)}</strong><br>মোট</div>
        <div class="summary-card"><strong>${toBengaliNumber(cows)}</strong><br>গরু</div>
        <div class="summary-card"><strong>${toBengaliNumber(goats)}</strong><br>ছাগল</div>
      `;
    }

    function renderDashboard() {
      renderSummary();
      const grid = document.getElementById('animalsGrid');
      grid.innerHTML = '';

      animalsData.forEach(animal => {
        const age = calculateAge(animal.birth);
        const preg = calculatePregnancy(animal.preg);
        const emoji = animal.type === "cow" ? "🐄" : "🐐";

        const card = document.createElement('div');
        card.className = 'animal-card';

        let content = `
          ${animal.image ? `<img src="${animal.image}" class="animal-image" alt="${animal.name}">` : `<div style="width:110px;height:110px;border-radius:50%;background:#e2e8f0;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:3rem;">${emoji}</div>`}
          
          <div style="text-align:center;">
            <div style="font-size:1.7rem; font-weight:700; margin-bottom:6px;">${animal.name}</div>
            <div style="color:#666; font-size:0.98rem;">বয়স: ${age}</div>
          </div>
        `;

        if (preg.isPregnant) {
          content += `
            <div class="start-date">
              গর্ভধারণ শুরু: <strong>${preg.startDate}</strong>
            </div>
            <div class="pregnancy-main">
              <div style="color:#059669; font-weight:700; font-size:1.1rem; margin-bottom:6px;">গর্ভধারণ চলছে</div>
              <strong style="font-size:1.85rem; color:#059669;">${preg.months} মাস ${preg.days} দিন</strong>
            </div>
            <div class="delivery-date">
              সম্ভাব্য ডেলিভারি: <strong>${preg.deliveryDate}</strong>
            </div>
            <div class="days-left">
              ${preg.daysLeft} দিন বাকি
            </div>
            <div style="height:32px; background:#e2e8f0; border-radius:999px; overflow:hidden;">
              <div style="height:100%; width:${preg.progress}%; background:linear-gradient(90deg,#10b981,#34d399);"></div>
            </div>
          `;
        } else {
          content += `
            <div class="not-pregnant">
              
            </div>
          `;
        }

        card.innerHTML = content;
        grid.appendChild(card);
      });
    }

    window.onload = () => {
      renderDashboard();
      setInterval(renderDashboard, 60000);
    };
  </script>
</body>
</html>
